<!DOCTYPE html>
<html lang="nb">
<head><meta charset="utf-8"><title>Discloggen selvtest</title></head>
<body>
<h1>Selvtest av regnelogikk</h1>
<div id="out"></div>

<!-- discs.js registrerer lyttere på disse ved import — må finnes i DOM-en -->
<input type="file" id="f-photo" hidden>
<canvas id="cropcv" width="256" height="256" hidden></canvas>
<input type="range" id="cropzoom" hidden>

<!-- for stats.js/discs.js/session.js-testene: samme elementer som index.html bruker -->
<section id="v-stats" style="display:none"></section>
<section id="v-discs" style="display:none"></section>
<section id="v-train" style="display:none"></section>
<div class="modal" id="m-session"><div class="sheet" id="sd-body"></div></div>
<div class="modal" id="m-aim"><div class="sheet"><h2 id="aim-title"></h2><div id="aim-opts"></div></div></div>
<div class="modal" id="m-wind"><div class="sheet"><div id="wind-dirs"></div><div id="wind-str-field"><div id="wind-strs"></div></div></div></div>
<div class="modal" id="m-discsel"><div class="sheet"><h2 id="discsel-title"></h2><div id="discsel-list"></div></div></div>
<div id="toast" style="display:none"></div>
<div id="flash" style="display:none"></div>

<script type="module">
import { distM, bearing, destination, decompose, demoPoint } from "./js/geo.js";
import { missOf, S, allThrows } from "./js/state.js";
import { seedDefaultDiscs, renderDiscs } from "./js/discs.js";
import { renderStats } from "./js/stats.js";
import { renderTrain } from "./js/session.js";
import { ACTIONS } from "./js/util.js";

const out = document.getElementById("out");
let fails = 0;
function ok(name, got, want, tol = 0.5) {
  const pass = Math.abs(got - want) <= tol;
  if (!pass) fails++;
  out.innerHTML += `<div>${pass ? "PASS" : "FAIL"} ${name}: fikk ${got.toFixed(2)}, ventet ${want}</div>`;
}
function assert(name, cond) {
  if (!cond) fails++;
  out.innerHTML += `<div>${cond ? "PASS" : "FAIL"} ${name}</div>`;
}

const base = { la: 59.9139, lo: 10.7522 };
const north100 = destination(base, 0, 100);
ok("distM 100 m nord", distM(base, north100), 100, 0.1);
ok("bearing nord", bearing(base, north100), 0, 0.1);
const east50 = destination(base, 90, 50);
ok("bearing øst", bearing(base, east50), 90, 0.1);

// siktelinje 100 m nord; landing 60 m nord + 5 m øst
const landing = destination(destination(base, 0, 60), 90, 5);
const r = decompose(base, north100, landing);
ok("decompose dist", r.dist, Math.hypot(60, 5), 0.2);
ok("decompose side (+høyre)", r.side, 5, 0.2);
ok("decompose frem", r.frem, 60, 0.2);

// uten siktepunkt
const r2 = decompose(base, null, landing);
ok("uten aim: dist", r2.dist, Math.hypot(60, 5), 0.2);
assert("uten aim: side/frem er null", r2.side === null && r2.frem === null);

// presisjon: mål 100 m unna, landing 60 m frem + 5 m til høyre → bom = hypot(5, 40)
ok("missOf", missOf({ side: r.side, frem: r.frem, td: distM(base, north100) }), Math.hypot(5, 40), 0.3);

// demoPoint er synkron (instant-fiks i testmodus krever ingen await)
const dp = demoPoint("land");
assert("demoPoint er synkron og gir la/lo/acc", typeof dp.la === "number" && typeof dp.lo === "number" && typeof dp.acc === "number");

// --- seedDefaultDiscs: kun på fersk install, kun én gang ---
S.set.seeded = false; S.discs = []; S.sessions = []; S.cur = null;
seedDefaultDiscs();
assert("seedDefaultDiscs: sår 4 discer på fersk install", S.discs.length === 4);
assert("seedDefaultDiscs: setter seeded-flagg", S.set.seeded === true);
const idsAfterFirstSeed = S.discs.map(d => d.id).join(",");

S.discs = []; // bruker sletter alle discene sine igjen
seedDefaultDiscs();
assert("seedDefaultDiscs: sår IKKE på nytt når seeded=true (bruker fjernet dem bevisst)", S.discs.length === 0);

S.set.seeded = false; S.discs = [{ id: "x", navn: "Egen disc" }];
seedDefaultDiscs();
assert("seedDefaultDiscs: rører ikke eksisterende discer selv om seeded var false", S.discs.length === 1 && S.discs[0].id === "x");

// --- statistikk: rundefaner + disc-bilde som kartmarkør ---
const TINY_PNG = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNk+A8AAQUBAScY42YAAAAASUVORK5CYII=";
S.discs = [
  { id: "d1", navn: "Med bilde", type: "Driver", ci: 0, img: TINY_PNG, ark: false, ts: 1 },
  { id: "d2", navn: "Uten bilde", type: "Putter", ci: 1, img: null, ark: false, ts: 1 },
];
const startA = { la: 59.9139, lo: 10.7522 };
const aimA = destination(startA, 0, 100);
const mkThrow = (discId, fwd, side) => {
  const land = destination(destination(startA, 0, fwd), 90, side);
  const dd = decompose(startA, aimA, land);
  return { id: "t" + Math.random(), discId, kt: "BH", dist: dd.dist, side: dd.side, frem: dd.frem, acc: 4, ts: Date.now(), pos: land };
};
S.sessions = [{
  id: "s1", ts: Date.now(), end: Date.now(), sm: "L",
  rounds: [
    { ts: Date.now(), start: startA, aim: aimA, pend: [], throws: [mkThrow("d1", 60, 3), mkThrow("d2", 55, -2)] },
    { ts: Date.now(), start: startA, aim: aimA, pend: [], throws: [mkThrow("d1", 62, 1)] },
  ],
}];
S.cur = null;

renderStats();
assert("renderStats: kjører uten feil og viser økten", document.getElementById("v-stats").innerHTML.includes("kast"));

ACTIONS["session-open"]("s1");
const sd = document.getElementById("sd-body").innerHTML;
assert("øktdetalj: rundefaner vises ved 2+ runder", sd.includes("roundtabs") && sd.includes("Runde 1") && sd.includes("Runde 2"));
assert("øktdetalj: disc MED bilde får <image>-markør", sd.includes("<image"));
assert("øktdetalj: disc UTEN bilde faller tilbake til farget prikk", /r="5"\s+fill="var\(--c1\)"/.test(sd));
assert("øktdetalj: sirkulær klipping (clipPath) er definert", sd.includes('id="discclip"'));
assert("øktdetalj: alle markører har stor usynlig trykkflate (r=14)", (sd.match(/r="14"/g) || []).length === 3);

ACTIONS["round-sel"]("s1:1");
const sdR2 = document.getElementById("sd-body").innerHTML;
assert("runde 2-fane: viser bare rundens eget kast (1 markør)", (sdR2.match(/r="14"/g) || []).length === 1);
assert("runde 2-fane: den ene discen har bilde", sdR2.includes("<image"));

// --- click-basert trykk (ikke lenger pointerdown) ---
let fired = 0;
ACTIONS["__test_click__"] = () => { fired++; };
const btn = document.createElement("button");
btn.dataset.act = "__test_click__";
document.body.appendChild(btn);
btn.dispatchEvent(new PointerEvent("pointerdown", { bubbles: true }));
assert("pointerdown alene trigger IKKE lenger data-act", fired === 0);
btn.click();
assert("click trigger data-act", fired === 1);
btn.remove();
delete ACTIONS["__test_click__"];

// --- sorterbar per-disc: komposittscore for "totalt" ---
S.discs = [
  { id: "A", navn: "DiscA", type: "Driver", ci: 0, img: null, ark: false, ts: 1 },
  { id: "B", navn: "DiscB", type: "Putter", ci: 1, img: null, ark: false, ts: 1 },
  { id: "C", navn: "DiscC", type: "Midrange", ci: 2, img: null, ark: false, ts: 1 },
];
const mkL = (discId, dist) => ({ id: "l" + Math.random(), discId, kt: "BH", dist, side: 0, frem: dist, acc: 4, ts: Date.now(), pos: { la: 0, lo: 0 } });
const mkP2 = (discId, miss) => ({ id: "p" + Math.random(), discId, kt: "BH", dist: 50, side: 0, frem: 50 + miss, td: 50, acc: 4, ts: Date.now(), pos: { la: 0, lo: 0 } });
S.sessions = [
  { id: "sl", ts: 1, end: 1, sm: "L", rounds: [{ ts: 1, start: { la: 0, lo: 0 }, aim: { la: 0, lo: 0 }, pend: [], throws: [mkL("A", 100), mkL("B", 50), mkL("C", 75)] }] },
  { id: "sp", ts: 2, end: 2, sm: "P", rounds: [{ ts: 2, start: { la: 0, lo: 0 }, aim: { la: 0, lo: 0 }, pend: [], throws: [mkP2("A", 20), mkP2("B", 2), mkP2("C", 5)] }] },
];
S.cur = null;

// A: lengst (best lengde), dårligst presisjon. B: kortest, best presisjon.
// C: midt på lengde, nest best presisjon → skal vinne "totalt" (komposittscore 0.667 mot 0.5/0.5).
// NB: discnavnene dukker først opp i kart-tooltipene (scatter/target) i original
// kastrekkefølge — så vi må lete etter rekkefølgen KUN inne i selve "Per disc"-
// listen, ikke i hele siden, for å faktisk teste sorteringen.
const perDiscSection = () => document.getElementById("v-stats").innerHTML.split(">Per disc<")[1] ?? "";

ACTIONS["dsort"]("totalt");
let order = ["DiscA", "DiscB", "DiscC"].map(n => perDiscSection().indexOf(n));
assert("sortering totalt: DiscC (best balanse) kommer først", order[2] < order[0] && order[2] < order[1]);

ACTIONS["dsort"]("lengde");
order = ["DiscA", "DiscB", "DiscC"].map(n => perDiscSection().indexOf(n));
assert("sortering lengde: DiscA (lengst) kommer først", order[0] < order[1] && order[0] < order[2]);

ACTIONS["dsort"]("presisjon");
order = ["DiscA", "DiscB", "DiscC"].map(n => perDiscSection().indexOf(n));
assert("sortering presisjon: DiscB (minst bom) kommer først", order[1] < order[0] && order[1] < order[2]);

// --- disc-detalj: KPI-er + trendgraf (krever data fra 2+ økter) ---
const mkL2 = (discId, dist, ts) => ({ id: "l" + Math.random(), discId, kt: "BH", dist, side: 0, frem: dist, acc: 4, ts, pos: { la: 0, lo: 0 } });
S.discs = [{ id: "X", navn: "Trendisc", type: "Driver", ci: 0, img: null, ark: false, ts: 1 }];
S.sessions = [
  { id: "s1", ts: 1000, end: 1000, sm: "L", rounds: [{ ts: 1000, start: { la: 0, lo: 0 }, aim: null, pend: [], throws: [mkL2("X", 60, 1000)] }] },
  { id: "s2", ts: 2000, end: 2000, sm: "L", rounds: [{ ts: 2000, start: { la: 0, lo: 0 }, aim: null, pend: [], throws: [mkL2("X", 70, 2000)] }] },
];
S.cur = null;
renderStats();
ACTIONS["disc-open"]("X");
const dd = document.getElementById("sd-body").innerHTML;
assert("disc-detalj: viser navn og KPI", dd.includes("Trendisc") && dd.includes("Kast totalt"));
assert("disc-detalj: trendgraf vises med data fra 2 økter", dd.includes("Lengdeutvikling") && dd.includes("<svg"));
assert("disc-detalj: trend-punkt har tap-tooltip (r=14)", (dd.match(/r="14"/g) || []).length >= 2);

// --- disc-bibliotek: sortering (type/speed/lengste/presisjon) ---
S.discs = [
  { id: "P1", navn: "MinPutter", type: "Putter", sp: 3, ci: 0, img: null, ark: false, ts: 1 },
  { id: "D1", navn: "MinDriver", type: "Driver", sp: 12, ci: 1, img: null, ark: false, ts: 1 },
  { id: "M1", navn: "MinMid", type: "Midrange", sp: 5, ci: 2, img: null, ark: false, ts: 1 },
];
S.sessions = [
  { id: "sl2", ts: 1, end: 1, sm: "L", rounds: [{ ts: 1, start: { la: 0, lo: 0 }, aim: { la: 0, lo: 0 }, pend: [], throws: [mkL("D1", 90), mkL("M1", 45), mkL("P1", 20)] }] },
  { id: "sp2", ts: 2, end: 2, sm: "P", rounds: [{ ts: 2, start: { la: 0, lo: 0 }, aim: { la: 0, lo: 0 }, pend: [], throws: [mkP2("D1", 15), mkP2("M1", 6), mkP2("P1", 1)] }] },
];
S.cur = null;
renderDiscs();
const discsSection = () => document.getElementById("v-discs").innerHTML;

ACTIONS["dlsort"]("type");
let dOrder = ["MinPutter", "MinMid", "MinDriver"].map(n => discsSection().indexOf(n));
assert("disc-sortering type: Putter→Midrange→Driver rekkefølge", dOrder[0] < dOrder[1] && dOrder[1] < dOrder[2]);

ACTIONS["dlsort"]("speed");
dOrder = ["MinDriver", "MinMid", "MinPutter"].map(n => discsSection().indexOf(n));
assert("disc-sortering speed: høyest speed (Driver) først", dOrder[0] < dOrder[1] && dOrder[1] < dOrder[2]);

ACTIONS["dlsort"]("lengste");
dOrder = ["MinDriver", "MinMid", "MinPutter"].map(n => discsSection().indexOf(n));
assert("disc-sortering lengste: lengste personlig rekord (Driver, 90m) først", dOrder[0] < dOrder[1] && dOrder[1] < dOrder[2]);

ACTIONS["dlsort"]("presisjon");
dOrder = ["MinPutter", "MinMid", "MinDriver"].map(n => discsSection().indexOf(n));
assert("disc-sortering presisjon: lavest snittbom (Putter, 1m) først", dOrder[0] < dOrder[1] && dOrder[1] < dOrder[2]);

// --- målskive: enkel senterlinje + trekant (samme visuelle mønster som spredningskartet) ---
S.discs = [{ id: "X2", navn: "Sikteputter", type: "Putter", ci: 0, img: null, ark: false, ts: 1 }];
S.sessions = [{
  id: "sq", ts: 1, end: 1, sm: "P",
  rounds: [{ ts: 1, start: { la: 0, lo: 0 }, aim: { la: 0, lo: 0 }, pend: [], throws: [mkP2("X2", 3), mkP2("X2", 5)] }],
}];
S.cur = null;
renderStats();
ACTIONS["disc-open"]("X2");
const targetHTML = document.getElementById("sd-body").innerHTML;
assert("målskive: stiplet senterlinje (dashed) vises, uten tallverdi på streken", targetHTML.includes('stroke-dasharray="4 4"'));
assert("målskive: trekant for kastested vises (path-element)", /<path d="M [\d.]+ /.test(targetHTML));
assert("målskive: den gamle avstands-diagram-boksen er fjernet (fjernet etter tilbakemelding)", !targetHTML.includes('class="throwline"'));

// --- øktdetalj (presisjon): «Avstand mål» skal vises som egen KPI-stat ---
ACTIONS["session-open"]("sq");
const sessKPI = document.getElementById("sd-body").innerHTML;
assert("øktdetalj presisjon: viser «Avstand mål»-stat med riktig verdi (50 m)", sessKPI.includes("Avstand mål") && sessKPI.includes(">50<"));

// --- live presisjonsøkt: «Avstand mål» øverst i KPI-raden ---
const startB = { la: 59.9, lo: 10.7 };
const aimB = destination(startB, 0, 42);
S.cur = { id: "cur1", ts: Date.now(), sm: "P", rounds: [{ ts: Date.now(), start: startB, aim: aimB, pend: [], throws: [] }] };
renderTrain();
const live = document.getElementById("v-train").innerHTML;
assert("live presisjonsøkt: viser «Avstand mål»-stat med riktig verdi", live.includes("Avstand mål") && live.includes(">42<"));

S.cur.rounds[0].aim = null;
renderTrain();
const liveNoAim = document.getElementById("v-train").innerHTML;
assert("live presisjonsøkt: viser «–» for avstand før mål er satt", /Avstand mål/.test(liveNoAim) && liveNoAim.includes(">–<"));
S.cur = null;

// --- disc-utvalg + kartvalg av siktepunkt: tilbys ved start av lengdeøkt ---
S.set.demo = true;
S.discs = [{ id: "dtest", navn: "Test", type: "Putter", ci: 0, img: null, ark: false, ts: 1 }];
S.cur = null;
S.set.lastDiscSel = null;
ACTIONS["start-session"]("L");
await new Promise(r => setTimeout(r, 30));
assert("disc-utvalg: modal åpnes ved øktstart, før noe annet skjer", document.getElementById("m-discsel").classList.contains("open") && !S.cur);
assert("disc-utvalg: eneste disc er forhåndsvalgt (✅)", document.getElementById("discsel-list").innerHTML.includes("✅"));
ACTIONS["discsel-done"](); // bekreft utvalget → lar startSession fortsette til kastested + siktevalg
await new Promise(r => setTimeout(r, 30));
assert("disc-utvalg: S.cur.discSel settes til de bekreftede discene", Array.isArray(S.cur?.discSel) && S.cur.discSel.includes("dtest"));
const aimOpts = document.getElementById("aim-opts").innerHTML;
assert("lengdeøkt-siktevalg: «Velg på kart»-alternativ tilbys", aimOpts.includes("Velg på kart"));
assert("aim-map-handlingen er registrert", typeof ACTIONS["aim-map"] === "function");

// --- endre disc-utvalg midt i økten ---
S.discs.push({ id: "dtest2", navn: "Test2", type: "Driver", ci: 1, img: null, ark: false, ts: 1 });
ACTIONS["edit-discsel"]();
await new Promise(r => setTimeout(r, 30));
ACTIONS["discsel-toggle"]("dtest2");
ACTIONS["discsel-done"]();
await new Promise(r => setTimeout(r, 30));
assert("disc-utvalg rediger: ny disc lagt til i utvalget lagres på runden", S.cur.discSel.includes("dtest") && S.cur.discSel.includes("dtest2"));
renderTrain();
assert("kasteskjerm: viser begge valgte discer i gridet", document.getElementById("v-train").innerHTML.includes("Test2"));

// --- «Kast alle»: logger pend for hver valgte disc samtidig ---
ACTIONS["throw-all"]();
assert("kast alle: legger pend for alle valgte discer", S.cur.rounds[0].pend.length === 2);

// --- vind: chip i live-visning, setting via handlinger, arv til ny runde ---
renderTrain();
const liveWind = document.getElementById("v-train").innerHTML;
assert("vind-chip vises (umerket) til venstre for GPS-chip", liveWind.indexOf('data-act="wind-open"') !== -1 && liveWind.indexOf('data-act="wind-open"') < liveWind.indexOf('id="gps-chip"'));

ACTIONS["wind-dir"]("mot");
assert("vind-retning settes på runden med standard styrke middels", S.cur.rounds[0].wind?.d === "mot" && S.cur.rounds[0].wind?.s === 2);
ACTIONS["wind-str"]("4");
assert("vind-styrke ORKAN settes", S.cur.rounds[0].wind?.s === 4);
renderTrain();
assert("vind-chip viser satt vind", document.getElementById("v-train").innerHTML.includes("ORKAN"));

ACTIONS["round-same"]();
assert("ny runde (samme sted) arver vinden", S.cur.rounds.length === 2 && S.cur.rounds[1].wind?.d === "mot" && S.cur.rounds[1].wind?.s === 4);

ACTIONS["wind-dir"]("stille");
assert("vindstille fjerner styrken", S.cur.rounds[1].wind?.d === "stille" && S.cur.rounds[1].wind?.s === undefined);
assert("runde 1 beholder sin egen vind", S.cur.rounds[0].wind?.d === "mot");

// --- vind i statistikk: allThrows kobler vind på, filter + effektkort ---
const mkW = (fwd) => {
  const land = destination(destination(S.cur.rounds[0].start, 0, fwd), 90, 0);
  const dd = decompose(S.cur.rounds[0].start, null, land);
  return { id: "w" + Math.random(), discId: "dtest", kt: "BH", dist: dd.dist, side: null, frem: null, acc: 4, ts: Date.now(), pos: land };
};
S.cur.rounds[0].throws.push(mkW(80));   // runde med motvind/orkan
S.cur.rounds[1].throws.push(mkW(60));   // runde med vindstille
const withWind = allThrows();
assert("allThrows kobler rundens vind på kastet", withWind.some(t => t.wind?.d === "mot") && withWind.some(t => t.wind?.d === "stille"));

renderStats();
const statsWind = document.getElementById("v-stats").innerHTML;
assert("vindfilter-seg vises når vind er logget", statsWind.includes('data-act="wfilter"'));
assert("vind-effekt-kort vises med begge retninger", statsWind.includes("Vind-effekt") && statsWind.includes("Motvind") && statsWind.includes("Vindstille"));

ACTIONS["wfilter"]("mot");
const statsMot = document.getElementById("v-stats").innerHTML;
assert("motvind-filter: kun motvind-kastet telles (1 kast, 80 m)", statsMot.includes(">1<") && statsMot.includes(">80<"));
ACTIONS["wfilter"]("ALL");
S.cur = null;
S.set.demo = false;

// --- statistikk: disctype-filter + varmekart-toggle på lengdekartet ---
const hStart = { la: 60, lo: 10 };
const hAim = destination(hStart, 0, 60);
const mkHeat = (discId, fwd, side) => {
  const land = destination(destination(hStart, 0, fwd), 90, side);
  const dd = decompose(hStart, hAim, land);
  return { id: "h" + Math.random(), discId, kt: "BH", dist: dd.dist, side: dd.side, frem: dd.frem, acc: 4, ts: Date.now(), pos: land };
};
S.discs = [
  { id: "hp", navn: "HeatPutter", type: "Putter", ci: 0, img: null, ark: false, ts: 1 },
  { id: "hd", navn: "HeatDriver", type: "Driver", ci: 1, img: null, ark: false, ts: 1 },
];
S.sessions = [{ id: "hs", ts: 1, end: 1, sm: "L", rounds: [{ ts: 1, start: hStart, aim: hAim, pend: [], throws: [mkHeat("hp", 55, 1), mkHeat("hp", 58, -2), mkHeat("hd", 90, 3)] }] }];
renderStats();
const statsAll = document.getElementById("v-stats").innerHTML;
assert("disctype-filter vises over lengdekartet", statsAll.includes('data-act="typefilter"'));
assert("varmekart-knapp vises (av som standard)", statsAll.includes("🔥 Vis som varmekart"));

ACTIONS["typefilter"]("Driver");
const statsDriver = document.getElementById("v-stats").innerHTML;
assert("disctype-filter Driver: viser kun driver-kastet på kartet (1 markør)", (statsDriver.match(/r="14"/g) || []).length === 1);
ACTIONS["typefilter"]("ALL");

ACTIONS["toggle-heatmap"]();
const statsHeat = document.getElementById("v-stats").innerHTML;
assert("varmekart på: rutenett-rects vises, knapp bytter tekst", statsHeat.includes("<rect") && statsHeat.includes("Vis discer på kartet"));
ACTIONS["toggle-heatmap"]();
const statsBack = document.getElementById("v-stats").innerHTML;
assert("varmekart av: tilbake til vanlige markører (ingen rect)", !statsBack.includes("<rect"));

// --- trykk utenfor arket lukker økt-/disc-detaljen, trykk INNI gjør ikke ---
ACTIONS["session-open"]("hs");
assert("øktdetalj: modal er åpen", document.getElementById("m-session").classList.contains("open"));
document.getElementById("m-session").dispatchEvent(new MouseEvent("click", { bubbles: true }));
assert("øktdetalj: trykk på bakgrunn (utenfor arket) lukker modalen", !document.getElementById("m-session").classList.contains("open"));

ACTIONS["session-open"]("hs");
document.getElementById("sd-body").dispatchEvent(new MouseEvent("click", { bubbles: true }));
assert("øktdetalj: trykk INNI arket lukker IKKE modalen", document.getElementById("m-session").classList.contains("open"));
ACTIONS["session-close"]();

out.innerHTML += `<div id="sum">${fails ? "FAILS:" + fails : "ALLE TESTER OK"}</div>`;
</script>
</body>
</html>
